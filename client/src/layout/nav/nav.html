<header class="p-3 w-full fixed top-0 z-50 bg-[#242424] border-b border-gray-800 shadow-lg">
  <div class="flex items-center px-10 mx-auto gap-6 w-full">
    <!-- Left Section: Logo & Navigation -->
    <div class="flex-1 flex items-center gap-6">
      <a routerLink="/"
         class="max-h-16 text-white border-r border-gray-700 pr-6">
        <h3 class="text-2xl font-semibold text-white uppercase tracking-tight">GWAuction</h3>
      </a>
      <nav class="flex gap-4 my-2 uppercase text-sm font-bold text-gray-400">
        <a routerLink="/auctions" routerLinkActive="text-white border-b-2 border-[#ff4742]" class="hover:text-white transition-colors py-1">Auctions</a>
        @if (accountService.currentUser()) {
          <a routerLink="/sell" routerLinkActive="text-white border-b-2 border-[#ff4742]" class="hover:text-white transition-colors py-1">Sell</a>
        }
      </nav>
    </div>

    <!-- Center Section: Search Bar -->
    <div class="flex-none flex justify-center w-full max-w-md mx-6">
      <label class="input input-sm bg-[#1a1a1a] border-gray-700 flex items-center gap-2 w-full">
        <svg class="w-4 h-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" class="grow bg-transparent text-white placeholder-gray-500 outline-none" placeholder="Search auctions..." />
      </label>
    </div>

    <!-- Right Section: Login/Actions -->
    <div class="flex-1 flex items-center justify-end gap-3">
      @if (accountService.currentUser(); as user) {
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="flex items-center text-white text-lg gap-3 cursor-pointer hover:opacity-80 transition-opacity">
            <span class="font-medium text-sm">{{user.displayName}}</span>
            <div class="w-10 h-10 rounded-full border-2 border-gray-700 overflow-hidden">
              <img [src]="user?.imageUrl || '/user.png'" alt="user avatar" class="w-full h-full object-cover">
            </div>
          </div>
          <ul tabindex="0" class="dropdown-content menu bg-[#2a2a2a] border border-gray-800 rounded-xl z-1 w-52 p-2 mt-2 shadow-2xl text-gray-200">
            <li><a class="hover:bg-gray-800 py-2">Edit Profile</a></li>
            <li><a (click)="logout()" class="hover:bg-gray-800 py-2 text-red-400">Logout</a></li>
          </ul>
        </div>

        <!-- Messages / notifications -->
        <a routerLink="/messages" aria-label="Messages"
           class="relative w-10 h-10 rounded-full bg-[#33333a] hover:bg-[#41414a]
                  flex items-center justify-center transition-colors">
          <img src="/notification-6-svgrepo-com.svg" alt="Messages" class="w-6 h-6 invert opacity-90">
          @if (messageService.hasUnread()) {
            <span class="absolute bottom-0 right-0 w-3 h-3 rounded-full bg-red-500 border-2 border-[#33333a]"></span>
          }
        </a>
      } @else {
        <a routerLink="/login" [queryParams]="{ returnUrl: router.url }"
           class="btn btn-sm bg-[#ff4742] hover:bg-[#e63e39] border-none text-white normal-case px-6">
          Login
        </a>
        <a routerLink="/register"
           class="btn btn-sm btn-ghost text-gray-300 hover:text-white normal-case px-4">
          Sign up
        </a>
      }
    </div>
  </div>
</header>
