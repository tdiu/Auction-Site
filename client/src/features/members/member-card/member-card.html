@if (member(); as member) {
<div routerLink="/members/{{member.displayName}}"
     class="bg-[#242424] rounded-xl border border-gray-800 hover:border-gray-600 transition-all cursor-pointer overflow-hidden flex flex-col group h-full">

  <!-- Image Container -->
  <div class="aspect-square bg-[#1a1a1a] overflow-hidden relative">
    <img [src]="member.imageUrl || '/user.png'" 
         [alt]="member.displayName + ' image'" 
         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
         [class.opacity-30]="!member.imageUrl"
         [class.group-hover:opacity-50]="!member.imageUrl">
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col flex-grow">
    <!-- User Name -->
    <h3 class="text-lg font-bold text-white mb-1 line-clamp-1 group-hover:text-[#ff4742] transition-colors">
      {{member.displayName}}
    </h3>

    <!-- User Description (Placeholder) -->
    <p class="text-[13px] text-gray-400 leading-relaxed line-clamp-2 mb-4">
      {{member.description || 'This is a placeholder description for the member. They haven\'t added one yet.'}}
    </p>

    <div class="mt-auto pt-3 border-t border-gray-800 flex justify-between items-center text-[11px] text-gray-500 uppercase tracking-tighter">
      <span>Member since</span>
      <span class="text-gray-400">{{member.createdAt | date: 'MMM yyyy'}}</span>
    </div>
  </div>
</div>
}
