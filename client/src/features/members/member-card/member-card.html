@if (member(); as member) {
  <div routerLink="/members/{{member.displayName}}"
       class="card cursor-pointer transition-all duration-300 ease-in-out transform hover:-translate-y-2">
    <img src="{{member?.imageUrl || '/user.png'}}" alt="{{member.displayName}} image" class="rounded-lg">
    <div class="card-actions bg-black z-50 absolute bottom-0 w-full px-3 py-1 rounded-b-lg">
      <div class="flex flex-col text-white">
        <span class="font-semibold">{{member.displayName}}</span>
        <span>{{member.description}}</span>
      </div>
    </div>
  </div>
}
