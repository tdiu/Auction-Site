@if (auction(); as auction) {
<div routerLink="/auctions/{{auction.auctionId}}"
     class="bg-[#242424] rounded-xl border border-gray-800 hover:border-gray-600 transition-all cursor-pointer overflow-hidden flex flex-col group h-full">

  <!-- Image Container -->
  <div class="aspect-square bg-[#1a1a1a] overflow-hidden relative">
    <img [src]="auction.imageUrl || '/sword-svgrepo-com.svg'" 
         [alt]="auction.itemName + ' image'" 
         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
         [class.opacity-20]="!auction.imageUrl"
         [class.group-hover:opacity-40]="!auction.imageUrl">
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col flex-grow">
    <!-- Item Name -->
    <h3 class="text-lg font-bold text-white mb-1 line-clamp-1 group-hover:text-[#ff4742] transition-colors">
      {{auction.itemName}}
    </h3>

    <!-- Item Description (Placeholder) -->
    <p class="text-[13px] text-gray-400 leading-relaxed line-clamp-2 mb-4">
      This is a placeholder description for the auction item. It provides a brief summary of what's being auctioned.
    </p>

    <!-- Pricing -->
    <div class="mt-auto pt-3 border-t border-gray-800">
      <div class="flex justify-between items-end">
        <span class="text-xs text-gray-500 uppercase tracking-tighter">Starting</span>
        <div class="text-right text-xl font-bold text-white leading-none">
          {{auction.startingPrice}} <span class="text-[10px] text-gray-400 font-normal uppercase">CAD</span>
        </div>
      </div>

      @if (auction.buyNowPrice) {
        <div class="flex justify-between items-center mt-3 pt-2 border-t border-gray-800/50">
          <span class="text-[10px] text-gray-500 uppercase">Buy Now</span>
          <div class="text-[12px] text-gray-300 font-medium">
            <span class="text-green-500">{{auction.buyNowPrice}}</span> CAD
          </div>
        </div>
      }
    </div>
  </div>
</div>
}
