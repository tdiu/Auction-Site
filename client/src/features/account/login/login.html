<div class="max-w-md mx-auto p-8 mt-16 bg-[#242424] rounded-2xl shadow-2xl border border-gray-800">
  <div class="mb-8 text-center">
    <h2 class="text-3xl font-extrabold text-white">Log in</h2>
    <p class="text-gray-400 mt-2">Welcome back — sign in to bid, sell, and pay.</p>
  </div>

  <form #loginForm="ngForm" class="flex flex-col gap-6 w-full" (ngSubmit)="login(loginForm)">
    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2" for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        #email="ngModel"
        [(ngModel)]="creds.email"
        autocomplete="email"
        class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-[#ff4742] focus:border-transparent transition-all"
        [class.border-red-500]="hasSubmitted && email.invalid"
        placeholder="email@example.com"
        email
        required
      >
      @if (hasSubmitted && email.invalid) {
        <p class="text-red-500 text-xs mt-1">Enter a valid email address.</p>
      }
    </div>

    <!-- Password -->
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2" for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        #password="ngModel"
        [(ngModel)]="creds.password"
        autocomplete="current-password"
        class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-[#ff4742] focus:border-transparent transition-all"
        [class.border-red-500]="hasSubmitted && password.invalid"
        placeholder="Your password"
        required
      >
      @if (hasSubmitted && password.invalid) {
        <p class="text-red-500 text-xs mt-1">Password is required.</p>
      }
    </div>

    <button
      type="submit"
      [disabled]="isLoggingIn"
      class="btn bg-[#ff4742] hover:bg-[#e63e39] border-none text-white normal-case font-bold h-11 rounded-xl disabled:bg-gray-700 disabled:text-gray-400"
    >
      {{ isLoggingIn ? 'Logging in…' : 'Log in' }}
    </button>

    <p class="text-center text-sm text-gray-400">
      New here?
      <a routerLink="/register" class="text-[#ff4742] hover:underline font-medium">Create an account</a>
    </p>
  </form>
</div>
