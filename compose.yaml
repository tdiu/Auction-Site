services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auction"]
      interval: 5s
      timeout: 3s
      retries: 5
  mailpit:
    image: axllent/mailpit
    ports: [ "1025:1025", # SMTP in
             "8025:8025"] # web UI to read caught mail
volumes:
  pgdata:
